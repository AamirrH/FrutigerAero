<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Computer - Windows 7</title>
  <link rel="icon" type="image/webp" href="../media/Tonev-Windows-7-Windows-7-editor.256.png">
  <link rel="stylesheet" href="../css/Picture.css" />
  <link rel="stylesheet" href="../css/windowControls.css">
  <script src="../js/picture.js" defer></script>
  <script src="../js/windowControls.js" defer></script>
</head>
<body>

  <div class="overlay">
    <div class="title-bar">
      <span class="window-title">Frutiger Aero</span>
      <button class="minimise">&ndash;</button>
      <button class="Resume">&#9744;</button>
      <button class="close-btn">&#10005;</button>
    </div>
    <main>
      <section class="content">
        <div class="image-viewer">
          <img id="displayedImage" src="../media/ImageGallery1.jpg" alt="Nostalgic Image" />
        </div>
        <div class="image-controls">
          <button class="arrow-btn" id="prevImageButton">&#11013;</button>
          <button class="arrow-btn" id="nextImageButton">&#10145;</button>
        </div>
      </section>
    </main>
  </div>
  <audio id="bg-music" src="../media/AqauticAmbience.mp3" controls autoplay loop hidden></audio>
  </body>
  </html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Internet Explorer</title>
  <link rel="icon" type="image/webp" href="../media/Tonev-Windows-7-Windows-7-ie.256.png">
  <link rel="stylesheet" href="../css/InternetExplorer.css">
  <script src="../js/InternetExplorer.js" defer></script>
</head>
<body>
  <div class="ie6-window">
    <div class="title-bar">
      <span class="title">Home - Microsoft Internet Explorer</span>
      <div class="window-controls">
        <button class="min">-</button>
        <button class="max">□</button>
        <button class="close">×</button>
      </div>
    </div>

    <div class="menu-bar">
      <span>File</span>
      <span>Edit</span>
      <span>View</span>
      <span>Favorites</span>
      <span>Tools</span>
      <span>Help</span>
    </div>

    <div class="nav-bar">
      <button>Back</button>
      <button>Forward</button>
      <button>Stop</button>
      <button>Refresh</button>
      <button>Home</button>
      <button>Go</button>
      <button>Favorites</button>
      <button>Media</button>
    </div>

    <form id="searchForm">
      <input type="text" id="searchInput" placeholder="Search..." />
      <button type="submit">Search</button>
    </form>

    <div class="content">
      <iframe id="searchFrame" src="https://bing.com" width="100%" height="100%" frameborder="0"></iframe>
    </div>
  </div>

  <br><br><br>
  <big><p class="nostalgia-question">Feel Old Yet ?</p></big>
</body>
</html>
